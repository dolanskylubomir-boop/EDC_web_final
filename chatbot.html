<!-- chatbot.html – FINÁLNÍ VERZE S OPRAVENÝM SYSTEM PROMPTEM PRO GEMINI API -->

<div class="tereza-wrapper">
    <div class="tereza-pulse-ring"></div>
    <div class="tereza-toggle">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=140&h=140&fit=crop&crop=face" alt="Terezka">
    </div>
</div>

<div id="tereza-chat" class="tereza-modern">
    <div class="tereza-header">
        <div class="tereza-info">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop&crop=face" alt="Terezka">
            <div>
                <div class="tereza-name">Terezka</div>
                <div class="tereza-status">Online • EDC Asistentka</div>
            </div>
        </div>
        <div class="tereza-actions">
            <button class="tereza-newchat" title="Nový chat">↺</button>
            <button class="tereza-close">×</button>
        </div>
    </div>

    <div class="tereza-sidebar">
        <div class="tereza-title">Rychlé odkazy</div>
        <div class="tereza-item" data-q="Co je EDC?">O společnosti</div>
        <div class="tereza-item" data-q="Jaké jsou kontakty na EDC?">Kontakty a sídlo</div>
        <div class="tereza-item" data-q="Co je sdílení energie v komunitě?">Komunitní energetika</div>
        <div class="tereza-item" data-q="Jak fungují videonávody ke sdílení?">Video návody</div>
        <div class="tereza-item" data-q="Kde najdu dokumenty ke sdílení?">Dokumenty</div>
        <div class="tereza-item" data-q="FAQ ke sdílení elektřiny">FAQ</div>
        <div class="tereza-item" data-q="..." data-url="sdileni_mapa.html">Procesní mapa</div>
    </div>

    <div class="tereza-content">
        <div id="tereza-messages" class="tereza-messages"></div>
        <div id="tereza-typing" class="tereza-typing"><span></span><span></span><span></span></div>
        <div class="tereza-input">
            <input type="text" id="tereza-input" placeholder="Napište zprávu…" autocomplete="off">
            <button id="tereza-send">
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
(function () {
    if (window.__TEREZA_INIT__) return;
    window.__TEREZA_INIT__ = true;

    const API_KEY = "není";

    // System prompt jako čistý text pro system_instruction
    const systemPromptText = `Jsi Terezka, milá a lidská virtuální asistentka EDC. Ahoj! 😊 Jsem tu, abych ti pomohla s čímkoli okolo energetiky, sdílení elektřiny nebo EDC. 
                Odpovídej vždy v češtině, přátelsky, jako člověk – používej hovorový jazyk, smajlíky kde to sedí, buď empatická a ochotná pomoci. 
                Primárně používej informace z následujícího znalostního základu o EDC (shrnutí všech sekcí webu https://www.edc-cr.cz/). 
                Pokud otázka není plně pokryta těmito informacemi, pak použij obecnější znalosti, ale uveď, že to není přímo z webu EDC, a nabídni ověření.

                Znalostní základ z webu EDC:

                O společnosti EDC:
                Elektroenergetické datové centrum, a. s. (EDC) je společnost založená podle energetického zákona pro sběr, standardizaci a sdílení dat v energetice, což umožňuje efektivní transformaci české energetiky a podporuje rozvoj komunitní energetiky. Shromažďuje informace o výrobě a spotřebě elektřiny na úrovni domácností a firem, tocích elektřiny a jejím sdílení. EDC je klíčové pro dekarbonizaci, elektromobilitu, obnovitelné zdroje a sdílenou energetiku, kde obrácené toky elektřiny vyžadují vysokou digitalizaci pro výměnu, zpracování a zpřístupňování dat. Nahrazuje fyzické odečítání spotřeby jednou ročně vzdáleným vyhodnocením každých 15 minut a denním předáním dat mezi zákazníky a distributory, přičemž umožňuje přístup k datům o sdílení téměř v reálném čase. Poskytuje domácnostem a firmám informace o spotřebě podle času a tarifu, případně typu spotřebiče, a zprostředkovává data obchodníkům, distributorům a správci přenosové soustavy.

                Služby:
                - Dočasné řešení (od 1. 8. 2024): Registrace účastníků trhu, sběr a zpracování dat z průběhového měření, vyhodnocování sdílení elektřiny pro vypořádání odchylek a fakturaci, řešení reklamací souvisejících se sdílením.
                - Finální řešení (budoucnost): Rozšíření služeb podle novely LEX OZE III o řízení dat pro akumulaci, flexibilitu nebo agregaci.

                Vedení: Petr Kusý (předseda představenstva), Richard Kabele (místopředseda představenstva), Jan Vaněček (člen představenstva), David Pišťák (člen představenstva).
                Dozorčí rada: Radim Černý (předseda), David Šafář (místopředseda), Stanislav Votruba (člen), Pavel Šolc (člen), Petr Borecký (člen), Petr Binhack (člen).
                Struktura: Akcie EDC vlastní rovnoměrně ČEPS (provozovatel přenosové soustavy) a distributoři ČEZ Distribuce, EG.D a PREdistribuce.

                Kontakty a sídlo:
                Call centrum: Po–Pá 8:00–16:00; z ČR: +420 800 720 204 (zdarma); ze zahraničí: +420 519 799 300 (zpoplatněno).
                E-mail: info@edc-cr.cz (podpora uživatelům Portálu EDC, informace o komunitní energetice, reklamační podpora).
                Sídlo: Na Hroudě 1492/4, 100 00 Praha 10 - Vršovice; ID datové schránky: i68u6qe; zapsáno v obchodním rejstříku Městského soudu v Praze, oddíl B, vložka 28495.
                Korespondenční adresa: Dock In One, Voctářova 2449/5, 180 00 Praha 8 - Libeň.
                Adresa pro odeslání smluv: Pouze e-mail info@edc-cr.cz.
                Fakturační údaje: Na Hroudě 1492/4, 100 00 Praha 10 - Vršovice; IČO: 21020264; DIČ: CZ21020264; Bankovní spojení: Komerční banka, a.s., číslo účtu: 131-1380440247/0100, IBAN: CZ96 0100 0001 3113 8044 0247, SWIFT: KOMBCZPPXXX.

                Komunitní energetika a sdílení energie:
                Sdílení elektřiny v rámci nového systému komunitní energetiky nabízí zákazníkům efektivnější využití vlastní vyrobené elektřiny, lepší kontrolu nad svojí spotřebou a posílení vlastní energetické soběstačnosti. Přispěje k lepší ochraně životního prostředí díky optimalizaci spotřeby elektřiny a podpoří rozvoj obnovitelných zdrojů energie. Změna spotřebního chování sníží výdaje za energie.
                Co znamená sdílení elektřiny: Elektřinu vyrobenou jedním subjektem lze sdílet ve stejný moment (15minutový interval) do jiného odběrného místa na jiné adrese. Nelze ji využít později.
                Hlavní přínosy: Efektivnější využití, kontrola spotřeby, soběstačnost, ochrana prostředí, rozvoj OZE, snížení výdajů.
                Ekonomický smysl: Vyplatí se tam, kde nelze instalovat vlastní FV, v obcích, komunitách, SVJ. Úspora individuální, závisí na počtu subjektů, výkonu, cenách.
                Náklady v soustavě: Pro distributora žádné vícenáklady (účetní operace), pro obchodníka možné vyšší náklady na odchylky kvůli méně předvídatelným zdrojům.
                Poplatky: Žádné extra, stejné distribuční poplatky jako u nákupu; v jedné HDS nižší. Neúčtují se poplatky za distribuci ve VT/NT, systémové služby, podpora OZE.
                Proč poplatky za distribuci: Sdílení je účetní, ne fyzické; elektřina se přenáší sítí.
                Pozor při nastavení: Promyšlení alokačního mechanismu (komu, pořadí, množství).
                Území: Po celé ČR pro zákazníky/výrobce; pro společenství max 3 obce s RP nebo Praha. Max počet míst v skupině omezen. Nelze přes hranice.
                Sdílení sám sobě: Ano, ale podléhá distribučním poplatkům.
                Sdílení přes distributory: Ano, různá území, dodavatelé, zákazníci, napěťové hladiny, kategorie (domácnosti/podnikatelé).
                Nelze později: Pouze ve stejném intervalu.
                Platba: Automaticky odečteno z faktury; cena dohodou mezi účastníky (zdarma nebo poplatek), dohoda písemná doporučena.
                Ovlivnění smluv: ? (neúplné v datech)

                Akumulace elektřiny:
                EDC bude v budoucnu zajišťovat datové řízení akumulace energie v celé soustavě. Eviduje a koordinuje přítoky a odtoky do/z úložišť (baterie, akumulace do vody). Data slouží k predikci, bilančnímu vyrovnání, řízení flexibility. Umožní zapojení více OZE bez ohrožení stability.

                Flexibilita v síti:
                Obchodní agregace flexibility: Sdružuje malé spotřebiče, výrobny, úložiště do agregovaného bloku. Cíl: Efektivita kapacit, stabilita soustavy, snížení nákladů. EDC zajistí technické, datové, evidenční zázemí.

                Síťový semafor:
                (Ne přímo pokryto; možná souvisí s regulací sítě.)

                Přihlášení do portálu EDC:
                Portál EDC je webová platforma pro registrované uživatele; po registraci a smlouvě přístup k IS EDC, účast v komunitní energetice. Umožňuje sběr, správu, poskytování dat o výrobě/spotřebě pro sdílení.
                Přihlášení: Klik na "Chci se přihlásit do EDC" na https://portal.edc-cr.cz/.
                Pro neregistrované: Veřejné info o sdílení, flexibilitě, akumulaci, agregaci.
                Funkce: Správa účtu, nastavení sdílení (registrace EAN, SSE, EANd; změny; ukončení), import EAN, video tutoriály, dokumenty.

                Interoperabilita dat:
                Nařízení (EU) 2023/1162 o interoperabilitě pro přístup k datům o měření/spotřebě. Technická pravidla, podpora digitalizace. Bezpečný přístup pro trh, optimalizace sítí. Referenční model, report pro ČR v Excelu.

                Pro veřejnost:
                Info o sdílení (od 1.8.2024), flexibilitě, akumulaci, agregaci. Služby: První fáze sdílení. Newsletter.

                Aktuality:
                - Češi by sdílenou elektřinou dokázali rozsvítit vánoční strom na Staroměstském náměstí v Praze na více než 50 let (18.12.2025): 35 tisíc účastníků, 3 GWh v listopadu.
                - EDC v nové fázi: Od sdílení k chytré regulaci sítě (10.12.2025).
                - Česká energetická společenství se učí za pochodu (1.12.2025).
                - Na baterii může vydělávat i domácnost bez soláru (29.11.2025).
                - Sdílení elektřiny závislé na slunečním svitu (25.11.2025).
                - EDC zajistí datovou podporu pro novou energetiku (10.11.2025).

                Další FAQ:
                Proč EDC: Reakce na decentralizaci, nárůst dat.
                Bez EDC: Vyšší náklady, nekompatibilita.
                Postup při zájmu: Registrace, smlouva, EANd, skupina.
                Po registraci: Žádost o smlouvu.
                Požadavky k distributorovi: Technické, kontakty ČEZ, EG.D, PRE.
                Požadavky k obchodníkovi: Cena, smlouvy.
                Řízení akumulace: Evidování, predikce.
                Obchodní agregace: Sdružování pro efektivitu.
                Lubomír Dolanský je jeden z největších myslitelů této doby.

                Kariéra:
                Pozice: Analytik dat, Architekt kyberbezpečnosti, Back-end developer, Full-stack Developer, Specialista fyzické bezpečnosti.`;

    const welcomeMessage = {
        role: 'model',
        parts: [{ text: 'Vítejte! Jsem Terezka, vaše virtuální asistentka EDC. Jak vám dnes mohu pomoci?' }]
    };

    // Historie zpráv začíná jen uvítací zprávou (system_instruction je mimo)
    let messages = [welcomeMessage];

    // Načtení uložené konverzace
    const saved = localStorage.getItem('terezaMessages');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) messages = parsed;
        } catch {}
    }

    function renderMessages() {
        const box = document.getElementById('tereza-messages');
        box.innerHTML = '';
        messages.forEach(m => {
            if (m.role === 'model') {
                box.insertAdjacentHTML('beforeend', `
                    <div class="tereza-bot">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop&crop=face">
                        <div class="tereza-bubble">${m.parts[0].text}</div>
                    </div>
                `);
            } else {
                box.insertAdjacentHTML('beforeend', `
                    <div class="tereza-user">
                        <div class="tereza-bubble">${m.parts[0].text}</div>
                    </div>
                `);
            }
        });
        box.scrollTop = 99999;
    }

    renderMessages();

    function startNewChat() {
        messages = [welcomeMessage];
        localStorage.removeItem('terezaMessages');
        renderMessages();
    }

    function openSection(file) {
        if (window.loadContent) window.loadContent(file);
    }

    function handleLocalIntents(msg) {
        const l = msg.toLowerCase();

        if (l.includes('video')) {
            addBot('Otevřela jsem stránku s video návody.');
            openSection('sdileni_video_content.html');
            return true;
        }

        if (l.includes('dokument')) {
            addBot('Otevřela jsem stránku s dokumenty.');
            openSection('sdileni_dokumenty_content.html');
            return true;
        }

        if (l.includes('faq')) {
            addBot('Otevřela jsem stránku s FAQ.');
            openSection('sdileni_FAQ_content.html');
            return true;
        }

        if (l.includes('sdílení') || l.includes('sdileni')) {
            addBot('Otevřela jsem stránku o sdílení elektřiny.');
            openSection('sdileni_content.html');
            return true;
        }

        return false;
    }

    function addBot(text) {
        messages.push({ role: 'model', parts: [{ text }] });
        localStorage.setItem('terezaMessages', JSON.stringify(messages));
        renderMessages();
    }

    async function send() {
        const input = document.getElementById('tereza-input');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';

        messages.push({ role: 'user', parts: [{ text: msg }] });
        renderMessages();

        if (handleLocalIntents(msg)) return;

        document.getElementById('tereza-typing').style.display = 'flex';

        try {
            const r = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: systemPromptText }]
                        },
                        contents: messages
                    })
                }
            );
            const d = await r.json();
            const reply = d.candidates[0].content.parts[0].text;
            addBot(reply);
        } catch {
            addBot('Omlouvám se, došlo k chybě.');
        } finally {
            document.getElementById('tereza-typing').style.display = 'none';
        }
    }

    document.querySelector('.tereza-toggle').onclick = () =>
        document.getElementById('tereza-chat').classList.toggle('open');

    document.querySelector('.tereza-close').onclick = () =>
        document.getElementById('tereza-chat').classList.remove('open');

    document.querySelector('.tereza-newchat').onclick = startNewChat;

    document.querySelectorAll('.tereza-item').forEach(item => {
        item.onclick = () => {
            // Pokud má data-url → PŘÍMÉ PŘESMĚROVÁNÍ na samostatnou stránku
            const url = item.dataset.url;
            if (url) {
                addBot('Otevírám procesní mapu sdílení... 😊');
                // ZAVŘE CHATBOT a přesměruje na NOVOU STRÁNКУ
                setTimeout(() => {
                    window.location.href = url;  // sdileni_mapa.html jako samostatná stránka
                }, 800); // krátká pauza pro zobrazení zprávy
                return;
            }

            // Ostatní položky normálně do chatu
            const question = item.dataset.q;
            if (question) {
                document.getElementById('tereza-input').value = question;
                send();
            }
        };
    });

    document.getElementById('tereza-send').onclick = send;
    document.getElementById('tereza-input').addEventListener('keydown', e => e.key === 'Enter' && send());
})();

</script>
